version: '3'
services:
  app:
  build: .
  ports:
    - "8080:8080"
  environment:
    SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/mydb
    SPRING_DATASOURCE_USERNAME:root
    SPRING_DATASOURCE_PASSWORD:root
  depends_on:
    - db
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD:root
      MYSQL_DATABASE:mydb
    volumes:
      - db-data:/var/lib/mysql
